<body>
    <div class="coupon_layer">
        <h2>[해외항공] 할인 쿠폰</h2> <!-- 2019-10-07 -->
        <div class="cont">
            <div class="imgbox"><img src="http://img.modetour.com/modetour/2018/air/img_coupon_191001v3.png" alt="해외항공 전체도시 할인쿠폰"/></div>
            <ul>
                <li>
                    <span class="tit">적용 대상</span>
                    <span class="txt">모두투어 닷컴 예약만 적용 가능 (제휴사 사이트 예약 적용 불가)</span>
                </li>
                <li>
                    <span class="tit">적용 금액</span>
                    <span class="txt">표시된 최소 항공료 기준으로 사용 (TAX, 유류할증료, 발권수수료제외)</span> <!-- 2019-10-07 -->
                </li>
                <li>
                    <span class="tit">적용 기간</span>
                    <span class="txt">~19년 12월 31일 결제 (출발일 무관)</span>
                </li>
                <li>
                    <span class="tit">사용 방법</span>
                    <span class="txt">SMS 전송받은 쿠폰 번호를 항공권 예약 이후 결제 요청_쿠폰번호 등록 후 사용</span>
                </li>
                <li>
                    <span class="tit">주의사항</span>
                    <span class="txt">예약번호 당 1개의 쿠폰만 사용가능<br>1번 승객에게 쿠폰 할인 적용되며, 취소 및 환불 시 소급 적용되지 않음</span>
                </li>
            </ul>
            <div class="numbox">
                <span class="txt">휴대폰번호</span>
                <label for="phonenumber1"><input type="text" name="phonenumber1" id="" value="" placeholder="010"/></label>
                <label for="phonenumber2"><input type="text" name="phonenumber2" id="" value="" placeholder="1234"/></label>
                <label for="phonenumber3"><input type="text" name="phonenumber3" id="" value="" placeholder="1234"/></label>
            </div>
        </div>
        <a href="#" class="btn_coupon"><span>할인쿠폰 번호받기</span></a>
