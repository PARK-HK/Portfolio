<div class="people_layer layer_common">
    <span class="tit">인원</span>
    <div class="boarding_passenger_box">
        <div class="people">
            <div class="tit">성인</div>
            <div class="calculate">
                <button type="button" class="btn_minus">
                    <span class="blind">인원빼기</span>
                </button>
                <span class="num">
                    <input type="text" name="" value="1" title="성인(만 12세 이상)인원" readonly/> <!-- 2019-02-27 업데이트 -->
                </span>
                <button type="button" class="btn_plus">
                    <span class="blind">인원추가</span>
                </button>
            </div> <!-- // calculate -->
        </div>
        <div class="people">
            <div class="tit">소아<span class="sub_tit">(만 11세 미만)</span></div>
            <div class="calculate">
                <button type="button" class="btn_minus">
                    <span class="blind">인원빼기</span>
                </button>
                <span class="num">
                    <input type="text" name="" value="1" title="성인(만 12세 이상)인원" readonly="readonly"/> <!-- 2019-02-27 업데이트 -->
                </span>
                <button type="button" class="btn_plus">
                    <span class="blind">인원추가</span>
                </button>
            </div> <!-- // calculate -->
        </div>
        <div class="people">
            <div class="tit">유아<span class="sub_tit">(만 2세 미만)</span></div>
            <div class="calculate">
                <button type="button" class="btn_minus">
                    <span class="blind">인원빼기</span>
                </button>
                <span class="num">
                    <input type="text" name="" value="1" title="성인(만 12세 이상)인원" readonly="readonly"/> <!-- 2019-02-27 업데이트 -->
                </span>
                <button type="button" class="btn_plus">
                    <span class="blind">인원추가</span>
                </button>
            </div> <!-- // calculate -->
        </div>
    </div> <!-- // boarding_passenger_box -->
    <div class="info_box">
        <ul>
            <li>항공권 탑승 인원은 총 9명까지 예약 가능합니다.</li>
            <li>나이는 출발일 기준으로 적용됩니다.</li>
            <li>유아 선택 시 성인은 꼭 포함되어야 합니다.</li>
            <li>유아 나이를 귀국일 기준 만 2세 미만으로 적용하는 항공사가 있으므로, 요금이 변동될 수 있습니다.</li>
        </ul>
    </div> <!-- // info_box -->
    <span class="tit">좌석등급</span>
    <div class="seat_box">
        <ul>
            <li><a href="#"><span>일반석</span></a></li>
            <li><a href="#"><span>프리미엄<br>일반석</span></a></li>
            <li><a href="#"><span>비즈니스</span></a></li>
            <li><a href="#"><span>일등석</span></a></li>
        </ul>
    </div> <!-- // seat_box -->
    <div class="btn_ps_box">
        <button type="button">확인</button>
    </div>
</div> <!-- // people_layer -->
