            // 체크박스_유진매니저님공유
            jQuery("input[type='checkbox']").on("click",function(){
                if(jQuery(this).is(":checked"))
                {
                    jQuery(this).parents("label").addClass("on");
                }
                else
                {
                    jQuery(this).parents("label").removeClass("on");
                }
            });
            // 라디오박스_유진매니저님공유
            jQuery('input[type=radio]').on('click', function(){
                jQuery(this).parents().siblings('label').removeClass('on');
                if(jQuery(this).is(':checked')) 
                {
                    jQuery(this).parents('label').addClass('on');
                }
            });

            // 예약취소레이아웃에서 사유들 선택
            jQuery(".reason_box .reason").each(function(){
                jQuery(".reason").find("label > input[type='radio']").css("visibility","hidden"); // 2019-08-16
                jQuery(this).find(".chk_field").on("click",function(){
                    jQuery(".reason_box .reason").find("li > label").not(this).removeClass("on");
                    jQuery(this).addClass("on"); // 2019-08-16
                    jQuery(".reason_box .reason").find("li > label > input[type='radio']").not(this).css("visibility","hidden"); // 2019-08-16
                    // jQuery(".etc").find("input").addClass("no");
                });
