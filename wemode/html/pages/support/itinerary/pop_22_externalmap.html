<body>
<div class="itinerary_pop_wrap">
	<div class="itinerary_pop">
		<h1>호텔 지도보기</h1>
		<div class="l_container">
			<div class="l_wrap">				
				<div class="pop_iti_externalmap">
					<h2 class="tit_k">호텔 뉴 한큐 오사카</h2>
					<p class="tit_e">(Hotel New Hankyu Osaka)</p>
					<div class="map_wrap">
						구글지도 영역
					</div>
					<p class="address">
						<span class="loca_k">우메다</span>
						<span class="loca_e">1-1-35 Shibata 1 Kita-ku Osaka</span>			
						<a href="#" class="btn_copy">주소복사</a>
					</p>
				</div>
			</div>
		</div>
		<div class="btn_area">
			<a href="#" class="btn_close" title="닫기">닫기</a>
		</div>
	</div>
</div>

<script>
var $ = jQuery.noConflict(); //$충톨방지
$(document).ready(function(){
	//지도복사		
	$('.pop_iti_externalmap .btn_copy').on('click', function (e) {
		var urlTxt = $(this).prev('.loca_e').text();
		ci_clipboard(urlTxt);
	});
	function ci_clipboard(val) {
		var $temp = $("<input>");
		var copy_url = val;
		$("body").append($temp);
		$temp.val(copy_url).select();
		document.execCommand("copy");
		$temp.remove();
		alert("클립보드에 복사되었습니다.");
		return false;
	}
});
</script>
