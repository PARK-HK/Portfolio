<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>모두투어 - 로그인</title>
	<meta name="keywords" content="모두투어, 여행사, 해외여행, 해외항공, 동남아여행, 중국여행, 일본여행, 미주여행, 남태평양여행, 유럽여행, 인도여행, 아프리카 여행, 골프여행, 패키지, 에어텔, 허니문, 자유여행, 골프여행, jm프리미엄, 크루즈, 국내여행, 제주여행, 호텔, 숙박, 해외호텔, 국내숙박, 항공권 ,해외항공권 ,국내항공권, 철도 ,패스, 여행정보, 추천여행사, 최저가항공권" />
	<meta name="description" content="대한민국 여행의 기준이 되다! 모두투어는 해외여행, 국내여행, 패키지여행, 에어텔, 항공권, 호텔 등 각종 여행정보를 제공하는 국내 최대 여행포탈사이트 입니다." />
	<link rel="stylesheet" type="text/css" href="../../../../css/common_201609.min.css" />
	<link rel="stylesheet" type="text/css" href="../../../../css/pages/members/login_201804.min.css" />
</head>
<body role="document">
	<!-- 윈도우팝업 로그인 -->
	<section class="event_login">
		<div class="container evt_login_form">
			<h1><img src="//img.modetour.com/modetour/2016/members/img_logo.png" alt="모두투어"></h1>
			<p class="txt"><span class="item">2018 메가세일<br>패키지 5,000원 할인쿠폰</span>지금 바로 발급 받으세요.</p>
			<form action="">
				<fieldset>
					<div class="input_wrap">
						<label class="evt_label" for="test_id">아이디 입력</label>
						<input class="evt_input" type="text" name="test_id" id="test_id">
					</div>
					<div class="input_wrap">
						<label class="evt_label"  for="test_pw">비밀번호 입력</label>
						<input class="evt_input" type="password" name="test_pw" id="test_pw">
					</div>
					<button class="btn_issue" type="submit">쿠폰발급</button>
				</fieldset>
			</form>
			<div class="btn_area">
				<a href="#" class="btn_register">회원가입하러 가기</a>
			</div>
		</div>
	</section>
	<!-- [시작]: Common JS -->
	<script src="//js.modetour.com/jquery/ver/1.11.3.min.js"></script>
	<!-- [끝]: Common JS -->
	<script>
	var $ = jQuery.noConflict(); //$충돌방지 
	$(document).ready(function(){
		var $couponForm = $('.evt_login_form');
		$couponForm.find('.evt_input').on('focusin', function(){
			$(this).prev('.evt_label').addClass('on');
		}).on('focusout', function(){
			if($(this).val() ==''){
				$(this).prev('.evt_label').removeClass('on');
			}
		});
	});
	</script>
	<!-- //윈도우팝업 로그인 -->
</body>
</html>
