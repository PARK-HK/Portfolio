<div class="mail_layer share_mail_area" id="mail_share">
    <div class="mail_cont_box">
        <form>
            <fieldset>
                <div class="l_wrap">
                    <div class="l_sec pop_iti_mail">
                        <h2 class="blind">메일 발송</h2>
                        <table class="pop_iti_table">
                            <colgroup>
                                <col style="width:40%;">
                                <col style="width:60%;">
                            </colgroup>
                            <tbody>
                                <tr>
                                    <th><label for="test_sender" class="mail_exchange">보내는 사람 메일</label></th>
                                    <td>
                                        <input type="text" id="test_sender" name="test_sender" class="input" placeholder="abcde@naver.com">
                                    </td>
                                </tr>
                                <tr>
                                    <th><label for="test_sender_mail" class="mail_exchange">받는 사람 메일</label></th>
                                    <td>
                                        <input type="text" id="test_sender_mail" name="test_sender_mail" class="input" placeholder="baebae@naver.com">
                                    </td>
                                </tr>
                                <tr>
                                    <th class="mail_tit"><label for="test_title">메일 제목</label></th>
                                    <td>
                                        <input type="text" id="test_title" name="test_title" class="input" placeholder="찜 호텔!">
                                    </td>
                                </tr>								
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="txt_box">
                    <div class="not_chk">
                        <input type="checkbox" id="chk_mail_cont" name="mail_cont_check" class="noti_chkbox">
                        <label for="chk_mail_cont" class="chk_noti_field">
                            <span class="mail_noti">메일 발송을 위하여 받는 사람의 이메일을 입력하며, 입력된 정보는 저장되지 않습니다.</span>
                        </label>
                    </div>
                </div> <!-- // txt_box -->
                <div class="btn_box fav_mail_btn_box"> <!-- fav_mail_btn_box 클래스추가 (상세쪽에 btn_box클래스 영향때문) -->
                    <a href="#" class="btn_mail_cancel">취소</a>
                    <a href="#" class="btn_mail_send">보내기</a>
                </div>
            </fieldset>
        </form>
    </div>
</div> <!-- // mail_layer -->
