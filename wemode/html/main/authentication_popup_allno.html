            <script>
                var $ = jQuery.noConflict();

                // 190515 이미지맵 리사이징
                $(document).ready(function(e) {
                    $('img[usemap]').rwdImageMaps();
                });

                // 190515 checkbox 모두 선택시
                $("input:checkbox[name=agreechk]").on('click',function(){
                var chk = $('input:checkbox[name=agreechk]:checked');       
                var chk_num = chk.length;
                if(chk_num == 2){
                $(".fixed_btn .inactive_btn").addClass("active_btn");
                }else{
                $(".fixed_btn .inactive_btn").removeClass("active_btn");
                        }
            });
            </script>
            <script>
